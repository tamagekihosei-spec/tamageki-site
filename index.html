<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多摩劇｜法政大学公認演劇サークル</title>

  <!-- Google Fonts — ポップカラーテーマ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <script>
  if (sessionStorage.getItem("siteEntered") === "1") {
    document.documentElement.classList.add("skip-entrance");
  }
  </script>
  <!-- =========================
       劇場入口ページ
       ========================= -->
  <section id="entrance" class="entrance-page">
    <div class="entrance-content">
      <img src="assets/logo.png" class="entrance-logo" alt="多摩劇" />
      <p class="small-title">Hosei University Tama Theater Circle</p>
      <button id="enterButton" class="enter-button">劇場へ入る</button>
    </div>
  </section>

  <!-- =========================
       左右カーテン演出
       ========================= -->
  <div id="blackoutLayer" class="blackout-layer"></div>
  <div id="theaterEffect" class="theater-effect">
    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>
  </div>

  <!-- =========================
       サイト本体
       ========================= -->
  <div id="site" class="site hidden">

    <!-- ヘッダー -->
    <header class="site-header">
      <div class="site-logo" data-page="home"><img src="assets/logo.png" alt="多摩劇" /></div>

      <button id="menuButton" class="menu-button">☰</button>

      <nav id="globalNav" class="global-nav">
        <button data-page="info">公演情報</button>
        <button onclick="location.href='roles.html'">役職紹介</button>
        <button data-page="archive">公演アーカイブ</button>
        <button data-page="blog">たまげきブログ</button>
        <button onclick="location.href='radio.html'">たまり場ラジオ</button>
        <button onclick="location.href='qa.html'">よくある質問</button>
      </nav>
    </header>

    <main>
      <!-- ホーム -->
      <section id="home" class="page active white-page">
        <div class="hero">
          <p class="small-title">Hosei University Tama Theater Circle</p>
          <h2>ようこそ、多摩劇へ。</h2>
          <p>
           多摩劇は、法政大学多摩キャンパスを拠点に<br>活動する演劇サークルです！<br>
            役者、演出、照明、音響、制作、宣伝など、<br>さまざまな役職からひとつの舞台をつくっています！
          </p>
        </div>

        <div class="menu-grid">
          <button data-page="info">公演情報</button>
          <button onclick="location.href='roles.html'">役職紹介</button>
          <button data-page="archive">公演アーカイブ</button>
          <button data-page="blog">たまげきブログ</button>
          <button onclick="location.href='radio.html'">たまり場ラジオ</button>
          <button onclick="location.href='qa.html'">よくある質問</button>
        </div>
      </section>

      <!-- 公演アーカイブ -->
<section id="archive" class="page white-page archive-page">
  <div class="archive-inner">

    <h2>公演アーカイブ</h2>

    <p class="archive-lead">
      これまでの多摩劇の公演記録です。
    </p>

<p>coming soon</p><!-- ここにsection入れる -->

</section>

      
    </main>

    <footer class="site-footer">
      <div class="footer-social">
        <a href="https://x.com/Htamageki" target="_blank" rel="noopener noreferrer">
          <img src="assets/xicon.jpg" alt="X">
        </a>
        <a href="https://www.instagram.com/htamageki/" target="_blank" rel="noopener noreferrer">
          <img src="assets/instagram.png" alt="Instagram">
        </a>
      </div>
      <p><strong>Gmail:<a href="mailto:tamageki.hosei@gmail.com">tamageki.hosei@gmail.com</a></strong></p>
      <p>© 多摩劇 — Tama Geki</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
