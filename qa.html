          <div class="qa-item">
            <h3>演劇未経験でも入れますか？</h3>
            <p>もちろん入れる。大学から演劇を始めた団員も多数活躍中だ。</p>
          </div>

          <div class="qa-item">
            <h3>役者以外でも参加できますか？</h3>
            <p>参加できる。照明、音響、舞台美術、制作、衣装、小道具など、舞台には多くの部署がある。</p>
          </div>

          <div class="qa-item">
            <h3>見学だけでも大丈夫ですか？</h3>
            <p>大丈夫だ。まずは稽古場の雰囲気を見るところから始められる。</p>
          </div>
        </div>
